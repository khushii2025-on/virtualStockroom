<!DOCTYPE html>
<html>
<head>

<title>Virtual Stockroom VR</title>

<link rel="stylesheet" href="styles.css">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="script.js"></script>

</head>

<body>

<a-scene>

<a-sky color="#D6EAF8"></a-sky>

<a-plane rotation="-90 0 0" width="40" height="40" color="#AAB7B8"></a-plane>

<a-box position="0 3 -15" width="30" height="6" depth="0.2" color="#F2F3F4"></a-box>
<a-box position="-15 3 0" width="0.2" height="6" depth="30" color="#F2F3F4"></a-box>
<a-box position="15 3 0" width="0.2" height="6" depth="30" color="#F2F3F4"></a-box>

<a-box position="-6 1 -5" width="8" height="2" depth="1" color="#6E2C00"></a-box>
<a-box position="-6 3 -5" width="8" height="0.2" depth="1" color="#6E2C00"></a-box>

<a-box position="-9 2 -5" depth="0.8" height="0.8" width="0.8" color="#F5B041"></a-box>
<a-box position="-7 2 -5" depth="0.8" height="0.8" width="0.8" color="#5DADE2"></a-box>
<a-box position="-5 2 -5" depth="0.8" height="0.8" width="0.8" color="#EC7063"></a-box>

<a-box position="6 1 -5" width="8" height="2" depth="1" color="#1F618D"></a-box>
<a-box position="6 3 -5" width="8" height="0.2" depth="1" color="#1F618D"></a-box>

<a-box position="3 2 -5" depth="0.8" height="0.8" width="0.8" color="#F4D03F"></a-box>
<a-box position="5 2 -5" depth="0.8" height="0.8" width="0.8" color="#58D68D"></a-box>
<a-box position="7 2 -5" depth="0.8" height="0.8" width="0.8" color="#AF7AC5"></a-box>

<a-box position="-6 1 0" width="8" height="2" depth="1" color="#7D6608"></a-box>
<a-box position="-6 3 0" width="8" height="0.2" depth="1" color="#7D6608"></a-box>

<a-box position="-9 2 0" depth="0.8" height="0.8" width="0.8" color="#EB984E"></a-box>
<a-box position="-7 2 0" depth="0.8" height="0.8" width="0.8" color="#48C9B0"></a-box>
<a-box position="-5 2 0" depth="0.8" height="0.8" width="0.8" color="#CD6155"></a-box>

<a-light type="ambient" intensity="0.7"></a-light>
<a-light type="point" position="0 5 -5" intensity="1"></a-light>
<a-light type="point" position="0 5 3" intensity="1"></a-light>

<a-entity camera position="0 1.6 8" look-controls wasd-controls></a-entity>

</a-scene>

</body>
</html>
