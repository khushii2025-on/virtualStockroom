<!DOCTYPE html>
<html>
<head>
<title>Virtual Stockroom VR</title>

<link rel="stylesheet" href="style.css">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="script.js"></script>

</head>

<body>

<a-scene>

<a-sky color="#DDDDDD"></a-sky>

<a-plane rotation="-90 0 0" width="30" height="30" color="#999999"></a-plane>

<a-box position="0 2 -10" width="20" height="4" depth="0.2" color="#eeeeee"></a-box>
<a-box position="-10 2 0" width="0.2" height="4" depth="20" color="#eeeeee"></a-box>
<a-box position="10 2 0" width="0.2" height="4" depth="20" color="#eeeeee"></a-box>

<a-box position="-4 1 -5" width="6" height="2" depth="1" color="#8B4513"></a-box>

<a-box position="-5 2 -5" depth="0.8" height="0.8" width="0.8" color="#FFC65D"></a-box>
<a-box position="-3.5 2 -5" depth="0.8" height="0.8" width="0.8" color="#4CC3D9"></a-box>

<a-light type="ambient" color="#ffffff"></a-light>
<a-light type="point" position="0 4 0"></a-light>

<a-entity camera position="0 1.6 5" look-controls wasd-controls></a-entity>

</a-scene>

</body>
</html>
